<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileForge — PDF &amp; Image Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
:root{--bg:#06060a;--s1:#0e0e13;--s2:#16161d;--s3:#1f1f28;--s4:#2a2a35;--bdr:#1e1e28;--tx:#f0f0f5;--tx2:#9898a8;--tx3:#6a6a7a;--tx4:#4a4a58;--acc:#f97316;--acc2:#fb923c;--accd:rgba(249,115,22,.08);--red:#ef4444;--grn:#22c55e;--blu:#3b82f6;--pur:#a78bfa;--cyn:#22d3ee;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,6,10,.6);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.04);padding:0 32px;display:flex;align-items:center;height:56px;gap:16px}
.nav-logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--acc);letter-spacing:-.5px;cursor:pointer}
.nav-logo em{font-style:normal;color:var(--tx4);font-weight:400}
.nav-back{display:none;background:none;border:none;color:var(--tx3);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;transition:all .15s}
.nav-back:hover{background:var(--s2);color:var(--tx)}
.nav-back svg{width:16px;height:16px;vertical-align:middle;margin-right:4px}
.nav-pill{margin-left:auto;font-size:11px;color:var(--tx4);padding:4px 12px;border:1px solid var(--bdr);border-radius:20px;font-weight:500}

/* HERO */
.hero{position:relative;padding:140px 24px 60px;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,.07) 0%,rgba(249,115,22,.02) 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;opacity:.5}
.hero>*{position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border:1px solid rgba(249,115,22,.2);background:rgba(249,115,22,.06);border-radius:24px;font-size:12px;font-weight:600;color:var(--acc);margin-bottom:24px}
.hero-badge .hb-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero-title{font-size:52px;font-weight:900;letter-spacing:-1.5px;line-height:1.1;margin-bottom:16px;max-width:600px;margin-left:auto;margin-right:auto}
.hero-title span{background:linear-gradient(135deg,#f97316 0%,#fbbf24 50%,#f97316 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
@keyframes shimmer{to{background-position:200% center}}
.hero-sub{font-size:17px;color:var(--tx3);max-width:480px;margin:0 auto 12px;line-height:1.6;font-weight:400}
.hero-trust{display:flex;align-items:center;justify-content:center;gap:24px;margin-top:28px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx4);font-weight:500}
.trust-item svg{width:15px;height:15px;color:var(--grn)}

/* TOOLS SECTION */
.tools-section{max-width:960px;margin:0 auto;padding:0 24px 80px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx4);text-align:center;margin-bottom:32px}
.tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:768px){.tools-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.tools-grid{grid-template-columns:1fr}}
.tool-card{background:var(--s1);border:1px solid var(--bdr);border-radius:16px;padding:28px 24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.tool-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s}
.tool-card:hover{border-color:rgba(255,255,255,.08);transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.4)}
.tool-card:hover::before{opacity:1}
.tool-card>*{position:relative;z-index:1}
.tc-emoji{font-size:32px;margin-bottom:16px;display:block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.tc-title{font-size:16px;font-weight:700;margin-bottom:6px;letter-spacing:-.2px}
.tc-desc{font-size:13px;color:var(--tx3);line-height:1.5}
.tc-arrow{position:absolute;top:24px;right:20px;width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;color:var(--tx4);transition:all .2s;font-size:14px}
.tool-card:hover .tc-arrow{background:var(--acc);border-color:var(--acc);color:#000;transform:translateX(2px)}
.tc-tag{display:inline-block;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;margin-top:12px;text-transform:uppercase;letter-spacing:.4px}

/* WORKSPACE */
.workspace{display:none;max-width:780px;margin:0 auto;padding:32px 24px 80px}
.workspace.active{display:block}
.ws-title{font-size:22px;font-weight:800;margin-bottom:4px}
.ws-desc{font-size:13px;color:var(--tx3);margin-bottom:24px}

/* UPLOAD AREA */
.upload-box{border:2px dashed var(--s3);border-radius:14px;padding:56px 32px;text-align:center;cursor:pointer;transition:all .25s;position:relative}
.upload-box::before{content:'';position:absolute;inset:0;border-radius:14px;background:radial-gradient(circle at 50% 50%,var(--accd),transparent 70%);opacity:0;transition:opacity .3s}
.upload-box:hover,.upload-box.dragover{border-color:var(--acc)}
.upload-box:hover::before,.upload-box.dragover::before{opacity:1}
.upload-box>*{position:relative}
.upload-box svg{width:40px;height:40px;color:var(--tx4);margin-bottom:12px}
.upload-box:hover svg{color:var(--acc)}
.ub-title{font-size:15px;font-weight:600;margin-bottom:4px}
.ub-sub{font-size:12px;color:var(--tx3)}
.ub-sub b{color:var(--acc);cursor:pointer}
.ub-formats{font-size:11px;color:var(--tx4);margin-top:12px}

/* FILE LIST */
.file-list{margin-top:20px}
.file-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;margin-bottom:8px;transition:all .15s}
.file-item:hover{border-color:var(--s4)}
.fi-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.fi-info{flex:1;min-width:0}
.fi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-meta{font-size:11px;color:var(--tx4);font-family:'JetBrains Mono',monospace}
.fi-remove{background:none;border:none;color:var(--tx4);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.fi-remove:hover{background:rgba(239,68,68,.1);color:var(--red)}
.fi-drag{color:var(--tx4);cursor:grab;font-size:14px;padding:0 4px}

/* PREVIEW */
.preview-area{margin-top:20px;background:var(--s1);border:1px solid var(--bdr);border-radius:14px;overflow:hidden}
.preview-img{display:flex;align-items:center;justify-content:center;padding:20px;background:repeating-conic-gradient(var(--s2) 0% 25%, var(--s1) 0% 50%) 50%/16px 16px;min-height:200px;max-height:500px;overflow:hidden}
.preview-img img,.preview-img canvas{max-width:100%;max-height:460px;display:block;border-radius:4px}
.preview-controls{padding:14px 18px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-wrap:wrap}

/* CONTROLS */
.ctrl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-label{font-size:11px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;min-width:60px}
input[type="range"]{-webkit-appearance:none;height:4px;background:var(--s3);border-radius:2px;outline:none;flex:1;min-width:80px}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--tx);cursor:pointer;border:2px solid var(--bg)}
.ctrl-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3);min-width:30px;text-align:right}
select{padding:6px 10px;background:var(--s2);border:1px solid var(--bdr);border-radius:6px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:12px;outline:none}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--acc);color:#000}.btn-primary:hover{background:var(--acc2)}
.btn-outline{background:transparent;border:1px solid var(--bdr);color:var(--tx2)}.btn-outline:hover{background:var(--s2);color:var(--tx)}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn svg{width:16px;height:16px}
.btn-group{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* DOC SCANNER */
.scanner-wrap{position:relative;display:inline-block;max-width:100%}
.scanner-wrap canvas{display:block;max-width:100%;border-radius:6px}
.scanner-overlay{position:absolute;inset:0;z-index:2}
.scanner-overlay svg{position:absolute;inset:0;width:100%;height:100%}
.scanner-overlay polygon{fill:rgba(249,115,22,.08);stroke:var(--acc);stroke-width:2}
.corner-handle{position:absolute;width:22px;height:22px;background:var(--acc);border:3px solid #000;border-radius:50%;cursor:grab;z-index:5;transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,.4);transition:transform .1s}
.corner-handle:hover,.corner-handle:active{transform:translate(-50%,-50%) scale(1.2)}
.scan-steps{display:flex;gap:8px;margin:16px 0;align-items:center}
.scan-step{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx4)}
.scan-step.active{color:var(--acc);font-weight:600}
.scan-step .step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--s3);color:var(--tx4)}
.scan-step.active .step-dot{background:var(--acc);color:#000}
.scan-step.done .step-dot{background:var(--grn);color:#000}
.scan-step-line{flex:0 0 24px;height:2px;background:var(--s3)}
.preview-doc{text-align:center;padding:24px}
.preview-doc img{max-width:100%;max-height:500px;border-radius:6px;border:1px solid var(--bdr);box-shadow:0 8px 32px rgba(0,0,0,.3)}

/* CROP CANVAS */
.crop-container{position:relative;display:inline-block}
.crop-container canvas{display:block;max-width:100%;border-radius:4px}
.crop-selection{position:absolute;border:2px solid var(--acc);box-shadow:0 0 0 9999px rgba(0,0,0,.5);pointer-events:none;z-index:2}
.crop-dims{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--acc);background:rgba(0,0,0,.7);padding:2px 6px;border-radius:3px;white-space:nowrap}

/* PROGRESS */
.progress-bar{width:100%;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;background:var(--acc);border-radius:3px;transition:width .3s}

/* RESULT */
.result-box{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:24px;margin-top:20px;text-align:center}
.result-box .r-icon{font-size:32px;margin-bottom:8px}
.result-box .r-title{font-size:15px;font-weight:700;margin-bottom:4px}
.result-box .r-meta{font-size:12px;color:var(--tx3);margin-bottom:16px;font-family:'JetBrains Mono',monospace}
.result-box .r-savings{color:var(--grn);font-weight:700}

/* HIDDEN FILE INPUT */
input[type="file"]{display:none}
</style>
</head>
<body>

<nav class="nav">
    <div class="nav-logo" id="logoBtn">fileforge<em>.tools</em></div>
    <button class="nav-back" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m0 0l7 7m-7-7l7-7"/></svg>All Tools</button>
    <div class="nav-pill">100% Free</div>
</nav>

<!-- HOME -->
<div id="homePage">
<div class="hero">
    <div class="hero-badge"><span class="hb-dot"></span> No signup. No upload. Runs locally.</div>
    <h1 class="hero-title">All your <span>file tools</span> in one place</h1>
    <p class="hero-sub">Crop, compress, merge, convert — PDFs and images. Everything runs in your browser. Your files never leave your device.</p>
    <div class="hero-trust">
        <div class="trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Private &amp; Secure</div>
        <div class="trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Instant Results</div>
        <div class="trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg>No Watermarks</div>
    </div>
</div>
<div class="tools-section">
    <div class="section-label">Choose a tool</div>
    <div class="tools-grid" id="toolsGrid"></div>
</div>
</div>

<!-- WORKSPACES (one per tool) -->
<div class="workspace" id="ws-img-crop"></div>
<div class="workspace" id="ws-img-compress"></div>
<div class="workspace" id="ws-pdf-merge"></div>
<div class="workspace" id="ws-pdf-compress"></div>
<div class="workspace" id="ws-img-to-pdf"></div>
<div class="workspace" id="ws-pdf-to-img"></div>

<script>
const {PDFDocument} = PDFLib;

// ============================================================
// TOOL DEFINITIONS
// ============================================================
const TOOLS = [
    {id:'img-crop', title:'Crop Image', emoji:'\u2702\ufe0f', desc:'Select any part of a photo and save it', icon:'crop', color:'#3b82f6', tag:'Image', accepts:'image/*'},
    {id:'img-compress', title:'Compress Image', emoji:'\ud83d\udddc\ufe0f', desc:'Make a photo file smaller without losing quality', icon:'compress-img', color:'#22c55e', tag:'Image', accepts:'image/*'},
    {id:'pdf-merge', title:'Merge PDFs', emoji:'\ud83d\udcce', desc:'Join 2 or more PDF files into one', icon:'merge', color:'#f97316', tag:'PDF', accepts:'.pdf'},
    {id:'pdf-compress', title:'Compress PDF', emoji:'\ud83d\udcc9', desc:'Make a PDF file smaller in size', icon:'compress-pdf', color:'#a78bfa', tag:'PDF', accepts:'.pdf'},
    {id:'img-to-pdf', title:'Image to PDF', emoji:'\ud83d\uddbc\ufe0f', desc:'Turn photos into a PDF document', icon:'img2pdf', color:'#22d3ee', tag:'Convert', accepts:'image/*'},
    {id:'pdf-to-img', title:'PDF to Image', emoji:'\ud83d\udcc4', desc:'Save PDF pages as photos', icon:'pdf2img', color:'#ec4899', tag:'Convert', accepts:'.pdf'},
];

const ICONS = {
    'crop':'<rect x="6" y="6" width="12" height="12" rx="1"/><path d="M6 2v4M2 6h4M18 22v-4M22 18h-4"/>',
    'compress-img':'<circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/>',
    'merge':'<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="9" rx="1"/><rect x="8" y="15" width="8" height="6" rx="1"/><path d="M6 12v3h4m8-3v3h-4"/>',
    'compress-pdf':'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M9 15l2 2 4-4"/>',
    'img2pdf':'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>',
    'pdf2img':'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M10 13l2 2 4-4"/>',
    'upload':'<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
};

function svgIcon(name, size){
    return '<svg width="'+(size||22)+'" height="'+(size||22)+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICONS[name]+'</svg>';
}

// ============================================================
// BUILD HOME GRID
// ============================================================
const grid = document.getElementById('toolsGrid');
TOOLS.forEach(t => {
    const card = document.createElement('div');
    card.className = 'tool-card';
    card.addEventListener('click', () => openTool(t.id));

    // Hover glow uses tool color
    card.style.setProperty('--card-color', t.color);
    card.querySelector(':scope') || null; // no-op
    card.style.cssText += ';';

    const emoji = document.createElement('span');
    emoji.className = 'tc-emoji';
    emoji.textContent = t.emoji || '';

    const title = document.createElement('div');
    title.className = 'tc-title';
    title.textContent = t.title;

    const desc = document.createElement('div');
    desc.className = 'tc-desc';
    desc.textContent = t.desc;

    const tag = document.createElement('div');
    tag.className = 'tc-tag';
    tag.style.background = t.color + '12';
    tag.style.color = t.color;
    tag.textContent = t.tag;

    const arrow = document.createElement('div');
    arrow.className = 'tc-arrow';
    arrow.textContent = '\u2192';

    card.append(emoji, title, desc, tag, arrow);
    // Dynamic hover glow
    card.addEventListener('mouseenter', () => { card.style.setProperty('--cg', t.color + '08'); card.querySelector('.tc-arrow') && null; });
    card.style.cssText = '--cg:transparent';
    Object.assign(card.style, {}); // ensure style applied
    // Apply before pseudo background dynamically
    card.addEventListener('mouseenter', function(){ this.style.background = 'linear-gradient(180deg, ' + t.color + '08 0%, var(--s1) 60%)'; });
    card.addEventListener('mouseleave', function(){ this.style.background = 'var(--s1)'; });
    grid.appendChild(card);
});

// ============================================================
// NAVIGATION
// ============================================================
function openTool(id) {
    document.getElementById('homePage').style.display = 'none';
    document.querySelectorAll('.workspace').forEach(w => w.classList.remove('active'));
    const ws = document.getElementById('ws-' + id);
    ws.classList.add('active');
    document.getElementById('backBtn').style.display = 'flex';
    document.querySelector('.nav-pill').style.display = 'none';
    buildWorkspace(id);
    window.scrollTo(0, 0);
}
function goHome() {
    document.getElementById('homePage').style.display = 'block';
    document.querySelectorAll('.workspace').forEach(w => { w.classList.remove('active'); });
    document.getElementById('backBtn').style.display = 'none';
    document.querySelector('.nav-pill').style.display = '';
}
document.getElementById('backBtn').addEventListener('click', goHome);
document.getElementById('logoBtn').addEventListener('click', goHome);

// ============================================================
// WORKSPACE BUILDERS
// ============================================================
function buildWorkspace(id) {
    const ws = document.getElementById('ws-' + id);
    if (ws.dataset.built) return;
    ws.dataset.built = '1';
    const tool = TOOLS.find(t => t.id === id);

    if (id === 'img-crop') buildImgCrop(ws, tool);
    else if (id === 'img-compress') buildImgCompress(ws, tool);
    else if (id === 'pdf-merge') buildPdfMerge(ws, tool);
    else if (id === 'pdf-compress') buildPdfCompress(ws, tool);
    else if (id === 'img-to-pdf') buildImgToPdf(ws, tool);
    else if (id === 'pdf-to-img') buildPdfToImg(ws, tool);
}

// ---- HELPERS ----
function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(2) + ' MB';
}

function makeUpload(ws, accepts, multi, onFiles) {
    const wrap = document.createElement('div');
    const box = document.createElement('div');
    box.className = 'upload-box';
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = accepts;
    if (multi) inp.multiple = true;

    const iconDiv = document.createElement('div');
    iconDiv.innerHTML = svgIcon('upload', 40);
    const t = document.createElement('div'); t.className = 'ub-title'; t.textContent = 'Tap here to choose your file' + (multi ? 's' : '');

// ============================================================
function buildImgCrop(ws, tool) {
    ws.innerHTML = '';
    const h = document.createElement('h2'); h.className = 'ws-title'; h.textContent = '\u2702\ufe0f ' + tool.title;
    const d = document.createElement('p'); d.className = 'ws-desc'; d.textContent = 'Step 1: Choose a photo. Step 2: Drag on the photo to select the part you want. Step 3: Click "Crop & Download".';
    ws.append(h, d);

    let imgEl = null, cropData = null;

    const uploadWrap = makeUpload(ws, 'image/*', false, (files) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            imgEl = new Image();
            imgEl.onload = () => showCrop();
            imgEl.src = e.target.result;
        };
        reader.readAsDataURL(files[0]);
    });

    const previewArea = document.createElement('div'); previewArea.className = 'preview-area'; previewArea.style.display = 'none';
    const previewInner = document.createElement('div'); previewInner.className = 'preview-img';
    const cropContainer = document.createElement('div'); cropContainer.className = 'crop-container'; cropContainer.style.position = 'relative';
    const cvs = document.createElement('canvas');
    const sel = document.createElement('div'); sel.className = 'crop-selection'; sel.style.display = 'none';
    cropContainer.append(cvs, sel);
    previewInner.appendChild(cropContainer);
    const controls = document.createElement('div'); controls.className = 'preview-controls';
    const btnGroup = document.createElement('div'); btnGroup.className = 'btn-group'; btnGroup.style.marginTop = '0';
    const cropBtn = document.createElement('button'); cropBtn.className = 'btn btn-primary'; cropBtn.textContent = 'Crop & Download'; cropBtn.disabled = true;
    const resetBtn = document.createElement('button'); resetBtn.className = 'btn btn-outline'; resetBtn.textContent = 'Reset Selection';
    const newBtn = document.createElement('button'); newBtn.className = 'btn btn-outline'; newBtn.textContent = 'New Image';
    btnGroup.append(cropBtn, resetBtn, newBtn);
    controls.appendChild(btnGroup);
    previewArea.append(previewInner, controls);
    ws.appendChild(previewArea);

    let dragging = false, sx = 0, sy = 0;
    function showCrop() {
        uploadWrap.style.display = 'none'; previewArea.style.display = '';
        const maxW = 700;
        const scale = Math.min(maxW / imgEl.width, 1);
        cvs.width = imgEl.width; cvs.height = imgEl.height;
        cvs.style.width = (imgEl.width * scale) + 'px';
        cvs.style.height = (imgEl.height * scale) + 'px';
        const cx = cvs.getContext('2d'); cx.drawImage(imgEl, 0, 0);
        sel.style.display = 'none'; cropData = null; cropBtn.disabled = true;

        cropContainer.addEventListener('mousedown', (e) => {
            dragging = true;
            const r = cvs.getBoundingClientRect();
            sx = e.clientX - r.left; sy = e.clientY - r.top;
        });
        cropContainer.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const r = cvs.getBoundingClientRect();
            const cx2 = e.clientX - r.left, cy2 = e.clientY - r.top;
            const x = Math.max(0, Math.min(sx, cx2)), y = Math.max(0, Math.min(sy, cy2));
            const w = Math.min(Math.abs(cx2 - sx), r.width - x), ht = Math.min(Math.abs(cy2 - sy), r.height - y);
            sel.style.display = 'block';
            sel.style.left = x + 'px'; sel.style.top = y + 'px'; sel.style.width = w + 'px'; sel.style.height = ht + 'px';
            const sc = imgEl.width / r.width;
            cropData = { x: Math.round(x * sc), y: Math.round(y * sc), w: Math.round(w * sc), h: Math.round(ht * sc) };
            // Show dims
            let dimsEl = sel.querySelector('.crop-dims');
            if (!dimsEl) { dimsEl = document.createElement('div'); dimsEl.className = 'crop-dims'; sel.appendChild(dimsEl); }
            dimsEl.textContent = cropData.w + ' \u00d7 ' + cropData.h;
            cropBtn.disabled = false;
        });
        cropContainer.addEventListener('mouseup', () => { dragging = false; });
    }
    resetBtn.addEventListener('click', () => { sel.style.display = 'none'; cropData = null; cropBtn.disabled = true; });
    newBtn.addEventListener('click', () => { previewArea.style.display = 'none'; uploadWrap.style.display = ''; });
    cropBtn.addEventListener('click', () => {
        if (!cropData || !imgEl) return;
        const c = document.createElement('canvas'); c.width = cropData.w; c.height = cropData.h;
        c.getContext('2d').drawImage(imgEl, -cropData.x, -cropData.y);
        const a = document.createElement('a'); a.download = 'cropped.png'; a.href = c.toDataURL('image/png'); a.click();
    });
}

// 3. MERGE PDFs
// ============================================================
function buildPdfMerge(ws, tool) {
    ws.innerHTML = '';
    const h = document.createElement('h2'); h.className = 'ws-title'; h.textContent = tool.title;
    const d = document.createElement('p'); d.className = 'ws-desc'; d.textContent = 'Step 1: Add your PDF files (2 or more). Step 2: Use arrows to reorder. Step 3: Click "Merge PDFs".';
    ws.append(h, d);

    let files = [];
    const fileListEl = document.createElement('div'); fileListEl.className = 'file-list';
    const uploadWrap = makeUpload(ws, '.pdf', true, (newFiles) => {
        newFiles.forEach(f => { if (f.type === 'application/pdf') files.push(f); });
        renderList();
    });
    ws.appendChild(fileListEl);

    const btnGroup = document.createElement('div'); btnGroup.className = 'btn-group';
    const mergeBtn = document.createElement('button'); mergeBtn.className = 'btn btn-primary'; mergeBtn.textContent = 'Merge PDFs'; mergeBtn.disabled = true;
    const clearBtn = document.createElement('button'); clearBtn.className = 'btn btn-outline'; clearBtn.textContent = 'Clear All';
    btnGroup.append(mergeBtn, clearBtn);
    ws.appendChild(btnGroup);

    const resultDiv = document.createElement('div'); resultDiv.style.display = 'none';
    ws.appendChild(resultDiv);

    function renderList() {
        while (fileListEl.firstChild) fileListEl.removeChild(fileListEl.firstChild);
        files.forEach((f, i) => {
            const item = makeFileItem(f, '#f97316', () => { files.splice(i, 1); renderList(); });
            // Add move buttons
            const moveUp = document.createElement('button'); moveUp.className = 'fi-remove'; moveUp.textContent = '\u25b2'; moveUp.title = 'Move up';
            moveUp.style.fontSize = '10px';
            moveUp.addEventListener('click', (e) => { e.stopPropagation(); if (i > 0) { [files[i-1], files[i]] = [files[i], files[i-1]]; renderList(); }});
            const moveDown = document.createElement('button'); moveDown.className = 'fi-remove'; moveDown.textContent = '\u25bc'; moveDown.title = 'Move down';
            moveDown.style.fontSize = '10px';
            moveDown.addEventListener('click', (e) => { e.stopPropagation(); if (i < files.length - 1) { [files[i], files[i+1]] = [files[i+1], files[i]]; renderList(); }});
            item.insertBefore(moveDown, item.lastChild);
            item.insertBefore(moveUp, moveDown);
            fileListEl.appendChild(item);
        });
        mergeBtn.disabled = files.length < 2;
    }
    clearBtn.addEventListener('click', () => { files = []; renderList(); resultDiv.style.display = 'none'; });

    mergeBtn.addEventListener('click', async () => {
        mergeBtn.disabled = true; mergeBtn.textContent = 'Merging...';
        try {
            const merged = await PDFDocument.create();
            for (const file of files) {
                const bytes = await file.arrayBuffer();
                const doc = await PDFDocument.load(bytes);
                const pages = await merged.copyPages(doc, doc.getPageIndices());
                pages.forEach(p => merged.addPage(p));
            }
            const pdfBytes = await merged.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });

            resultDiv.style.display = '';
            resultDiv.innerHTML = '';
            const box = document.createElement('div'); box.className = 'result-box';
            const ri = document.createElement('div'); ri.className = 'r-icon'; ri.textContent = '\u2705';
            const rt = document.createElement('div'); rt.className = 'r-title'; rt.textContent = 'PDFs Merged Successfully';
            const rm = document.createElement('div'); rm.className = 'r-meta';
            rm.textContent = files.length + ' files \u2192 ' + merged.getPageCount() + ' pages \u00b7 ' + fmtSize(pdfBytes.length);
            const dlBtn = document.createElement('button'); dlBtn.className = 'btn btn-primary'; dlBtn.textContent = 'Download Merged PDF';
            dlBtn.addEventListener('click', () => { const a = document.createElement('a'); a.download = 'merged.pdf'; a.href = URL.createObjectURL(blob); a.click(); });
            box.append(ri, rt, rm, dlBtn);
            resultDiv.appendChild(box);
        } catch (err) {
            resultDiv.style.display = '';
            resultDiv.innerHTML = '';
            const box = document.createElement('div'); box.className = 'result-box';
            box.style.borderColor = 'rgba(239,68,68,.3)';
            const ri = document.createElement('div'); ri.className = 'r-icon'; ri.textContent = '\u274c';
            const rt = document.createElement('div'); rt.className = 'r-title'; rt.style.color = 'var(--red)'; rt.textContent = 'Merge Failed';
            const rm = document.createElement('div'); rm.className = 'r-meta'; rm.textContent = err.message;
            box.append(ri, rt, rm); resultDiv.appendChild(box);
        }
        mergeBtn.disabled = false; mergeBtn.textContent = 'Merge PDFs';
    });
}

// ============================================================
// 5. IMAGE TO PDF — Document Scanner Flow
// ============================================================
function buildImgToPdf(ws, tool) {
    ws.innerHTML = '';
    const h = document.createElement('h2'); h.className = 'ws-title'; h.textContent = '\ud83d\uddbc\ufe0f Photo to PDF';
    const d = document.createElement('p'); d.className = 'ws-desc'; d.textContent = 'Step 1: Choose a photo. Step 2: Crop it if you want (or skip). Step 3: Download as PDF.';
    ws.append(h, d);

    let imgEl = null, corners = [], displayScale = 1, croppedCanvas = null, dragCorner = -1;
    const cornerEls = [];

    // PHASE 1: Upload
    const uploadWrap = makeUpload(ws, 'image/*', false, (files) => {
        const reader = new FileReader();
        reader.onload = (e) => { imgEl = new Image(); imgEl.onload = () => showChoice(); imgEl.src = e.target.result; };
        reader.readAsDataURL(files[0]);
    });

    // PHASE 1b: "Want to crop?" choice
    const choiceArea = document.createElement('div'); choiceArea.className = 'preview-area'; choiceArea.style.display = 'none';
    const choiceInner = document.createElement('div'); choiceInner.className = 'preview-img';
    const choiceImg = document.createElement('img');
    choiceInner.appendChild(choiceImg);
    const choiceControls = document.createElement('div'); choiceControls.className = 'preview-controls';
    const choiceHint = document.createElement('div'); choiceHint.style.cssText = 'font-size:14px;color:var(--tx);margin-bottom:12px;font-weight:600;';
    choiceHint.textContent = 'Do you want to crop this image before converting?';
    const choiceBtns = document.createElement('div'); choiceBtns.className = 'btn-group'; choiceBtns.style.marginTop = '0';
    const yesCropBtn = document.createElement('button'); yesCropBtn.className = 'btn btn-primary'; yesCropBtn.textContent = 'Yes, let me crop';
    const noCropBtn = document.createElement('button'); noCropBtn.className = 'btn btn-outline'; noCropBtn.textContent = 'No, convert as-is';
    const choiceNewBtn = document.createElement('button'); choiceNewBtn.className = 'btn btn-outline'; choiceNewBtn.textContent = 'Pick different photo';
    choiceBtns.append(yesCropBtn, noCropBtn, choiceNewBtn);
    choiceControls.append(choiceHint, choiceBtns);
    choiceArea.append(choiceInner, choiceControls);
    ws.appendChild(choiceArea);

    // PHASE 2: Crop (only if they chose yes)
    const scanArea = document.createElement('div'); scanArea.className = 'preview-area'; scanArea.style.display = 'none';
    const scanInner = document.createElement('div'); scanInner.className = 'preview-img';
    const scanWrap = document.createElement('div'); scanWrap.className = 'scanner-wrap';
    const scanCanvas = document.createElement('canvas');
    const overlay = document.createElement('div'); overlay.className = 'scanner-overlay';
    scanWrap.append(scanCanvas, overlay);
    scanInner.appendChild(scanWrap);
    const scanControls = document.createElement('div'); scanControls.className = 'preview-controls';
    const scanHint = document.createElement('div'); scanHint.style.cssText = 'font-size:13px;color:var(--tx2);margin-bottom:10px;';
    scanHint.textContent = 'Drag the orange corners to select the part you want. Then tap "Done".';
    const scanBtns = document.createElement('div'); scanBtns.className = 'btn-group'; scanBtns.style.marginTop = '0';
    const doneBtn = document.createElement('button'); doneBtn.className = 'btn btn-primary'; doneBtn.textContent = 'Done \u2192 Download';
    const resetCropBtn = document.createElement('button'); resetCropBtn.className = 'btn btn-outline'; resetCropBtn.textContent = 'Reset Corners';
    const scanNewBtn = document.createElement('button'); scanNewBtn.className = 'btn btn-outline'; scanNewBtn.textContent = 'New Photo';
    scanBtns.append(doneBtn, resetCropBtn, scanNewBtn);
    scanControls.append(scanHint, scanBtns);
    scanArea.append(scanInner, scanControls);
    ws.appendChild(scanArea);

    // PHASE 3: Download
    const dlArea = document.createElement('div'); dlArea.style.display = 'none';
    ws.appendChild(dlArea);

    function hideAll() { choiceArea.style.display = 'none'; scanArea.style.display = 'none'; dlArea.style.display = 'none'; uploadWrap.style.display = 'none'; }

    function showChoice() {
        hideAll(); choiceArea.style.display = '';
        choiceImg.src = imgEl.src;
        choiceImg.style.maxHeight = '350px';
    }

    choiceNewBtn.addEventListener('click', () => { hideAll(); uploadWrap.style.display = ''; });

    // NO CROP — go straight to download
    noCropBtn.addEventListener('click', async () => {
        noCropBtn.disabled = true; noCropBtn.textContent = 'Creating PDF...';
        const c = document.createElement('canvas'); c.width = imgEl.width; c.height = imgEl.height;
        c.getContext('2d').drawImage(imgEl, 0, 0);
        await downloadAsPdf(c);
        noCropBtn.disabled = false; noCropBtn.textContent = 'No, convert as-is';
    });

    // YES CROP — show crop UI
    yesCropBtn.addEventListener('click', () => showCropper());

    function showCropper() {
        hideAll(); scanArea.style.display = '';
        const maxW = 650;
        displayScale = Math.min(maxW / imgEl.width, 1);
        scanCanvas.width = imgEl.width; scanCanvas.height = imgEl.height;
        scanCanvas.style.width = (imgEl.width * displayScale) + 'px';
        scanCanvas.style.height = (imgEl.height * displayScale) + 'px';
        scanCanvas.getContext('2d').drawImage(imgEl, 0, 0);
        const m = 0.05;
        corners = [
            { x: m * imgEl.width, y: m * imgEl.height },
            { x: (1 - m) * imgEl.width, y: m * imgEl.height },
            { x: (1 - m) * imgEl.width, y: (1 - m) * imgEl.height },
            { x: m * imgEl.width, y: (1 - m) * imgEl.height },
        ];
        renderOverlay();
    }

    function renderOverlay() {
        while (overlay.firstChild) overlay.removeChild(overlay.firstChild);
        cornerEls.length = 0;
        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
        svg.setAttribute('viewBox', '0 0 ' + imgEl.width + ' ' + imgEl.height);
        const defs = document.createElementNS(svgNS, 'defs');
        const mask = document.createElementNS(svgNS, 'mask'); mask.id = 'scanMask';
        const maskBg = document.createElementNS(svgNS, 'rect');
        maskBg.setAttribute('x', '0'); maskBg.setAttribute('y', '0'); maskBg.setAttribute('width', imgEl.width); maskBg.setAttribute('height', imgEl.height); maskBg.setAttribute('fill', 'white');
        const maskPoly = document.createElementNS(svgNS, 'polygon');
        maskPoly.setAttribute('points', corners.map(c => c.x + ',' + c.y).join(' ')); maskPoly.setAttribute('fill', 'black');
        mask.append(maskBg, maskPoly); defs.appendChild(mask); svg.appendChild(defs);
        const darkRect = document.createElementNS(svgNS, 'rect');
        darkRect.setAttribute('x', '0'); darkRect.setAttribute('y', '0'); darkRect.setAttribute('width', imgEl.width); darkRect.setAttribute('height', imgEl.height);
        darkRect.setAttribute('fill', 'rgba(0,0,0,0.5)'); darkRect.setAttribute('mask', 'url(#scanMask)');
        svg.appendChild(darkRect);
        const poly = document.createElementNS(svgNS, 'polygon');
        poly.setAttribute('points', corners.map(c => c.x + ',' + c.y).join(' '));
        poly.setAttribute('fill', 'none'); poly.setAttribute('stroke', '#f97316'); poly.setAttribute('stroke-width', '3');
        svg.appendChild(poly);
        overlay.appendChild(svg);
        corners.forEach((c, i) => {
            const handle = document.createElement('div'); handle.className = 'corner-handle';
            handle.style.left = (c.x * displayScale) + 'px';
            handle.style.top = (c.y * displayScale) + 'px';
            handle.addEventListener('mousedown', (e) => { e.preventDefault(); dragCorner = i; });
            overlay.appendChild(handle); cornerEls.push(handle);
        });
    }

    overlay.addEventListener('mousemove', (e) => {
        if (dragCorner < 0) return;
        const r = scanCanvas.getBoundingClientRect();
        const x = Math.max(0, Math.min(imgEl.width, (e.clientX - r.left) / displayScale));
        const y = Math.max(0, Math.min(imgEl.height, (e.clientY - r.top) / displayScale));
        corners[dragCorner] = { x, y };
        cornerEls[dragCorner].style.left = (x * displayScale) + 'px';
        cornerEls[dragCorner].style.top = (y * displayScale) + 'px';
        const polys = overlay.querySelectorAll('polygon');
        polys.forEach(p => p.setAttribute('points', corners.map(c => c.x + ',' + c.y).join(' ')));
    });
    document.addEventListener('mouseup', () => { dragCorner = -1; });

    resetCropBtn.addEventListener('click', () => {
        const m = 0.05;
        corners = [{ x: m*imgEl.width, y: m*imgEl.height },{ x: (1-m)*imgEl.width, y: m*imgEl.height },{ x: (1-m)*imgEl.width, y: (1-m)*imgEl.height },{ x: m*imgEl.width, y: (1-m)*imgEl.height }];
        renderOverlay();
    });
    scanNewBtn.addEventListener('click', () => { hideAll(); uploadWrap.style.display = ''; });

    // DONE — crop and download
    doneBtn.addEventListener('click', async () => {
        const xs = corners.map(c => c.x), ys = corners.map(c => c.y);
        const minX = Math.max(0, Math.min(...xs)), maxX = Math.min(imgEl.width, Math.max(...xs));
        const minY = Math.max(0, Math.min(...ys)), maxY = Math.min(imgEl.height, Math.max(...ys));
        const cw = Math.round(maxX - minX), ch = Math.round(maxY - minY);
        if (cw < 10 || ch < 10) return;
        const c = document.createElement('canvas'); c.width = cw; c.height = ch;
        const cx = c.getContext('2d');
        cx.filter = 'contrast(1.05) brightness(1.03)';
        cx.drawImage(imgEl, -Math.round(minX), -Math.round(minY));
        cx.filter = 'none';
        doneBtn.disabled = true; doneBtn.textContent = 'Creating PDF...';
        await downloadAsPdf(c);
        doneBtn.disabled = false; doneBtn.textContent = 'Done \u2192 Download';
    });

    async function downloadAsPdf(canvas) {
        try {
            const pngBlob = await new Promise(r => canvas.toBlob(r, 'image/png'));
            const pngBytes = await pngBlob.arrayBuffer();
            const pdf = await PDFDocument.create();
            const pngImg = await pdf.embedPng(pngBytes);
            const page = pdf.addPage([pngImg.width, pngImg.height]);
            page.drawImage(pngImg, { x: 0, y: 0, width: pngImg.width, height: pngImg.height });
            const pdfBytes = await pdf.save();

            // Show result
            hideAll(); dlArea.style.display = '';
            while (dlArea.firstChild) dlArea.removeChild(dlArea.firstChild);
            const box = document.createElement('div'); box.className = 'result-box';
            const ri = document.createElement('div'); ri.className = 'r-icon'; ri.textContent = '\u2705';
            const rt = document.createElement('div'); rt.className = 'r-title'; rt.textContent = 'PDF Ready!';
            const rm = document.createElement('div'); rm.className = 'r-meta'; rm.textContent = canvas.width + ' \u00d7 ' + canvas.height + 'px \u00b7 ' + fmtSize(pdfBytes.length);
            const dlBtn = document.createElement('button'); dlBtn.className = 'btn btn-primary'; dlBtn.style.marginRight = '8px';
            dlBtn.textContent = 'Download PDF';
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            dlBtn.addEventListener('click', () => { const a = document.createElement('a'); a.download = 'document.pdf'; a.href = URL.createObjectURL(blob); a.click(); });
            const dlImgBtn2 = document.createElement('button'); dlImgBtn2.className = 'btn btn-outline'; dlImgBtn2.style.marginRight = '8px';
            dlImgBtn2.textContent = 'Download as Image';
            dlImgBtn2.addEventListener('click', () => { const a = document.createElement('a'); a.download = 'document.png'; a.href = canvas.toDataURL('image/png'); a.click(); });
            const newBtn = document.createElement('button'); newBtn.className = 'btn btn-outline'; newBtn.textContent = 'Convert Another';
            newBtn.addEventListener('click', () => { hideAll(); uploadWrap.style.display = ''; });
            box.append(ri, rt, rm, dlBtn, dlImgBtn2, newBtn);
            dlArea.appendChild(box);
        } catch (err) { alert('Error: ' + err.message); }
    }
}

// ============================================================
// 6. PDF TO IMAGE
// ============================================================
function buildPdfToImg(ws, tool) {
    ws.innerHTML = '';
    const h = document.createElement('h2'); h.className = 'ws-title'; h.textContent = tool.title;
    const d = document.createElement('p'); d.className = 'ws-desc'; d.textContent = 'Step 1: Choose a PDF. Each page will become a photo you can download.';
    ws.append(h, d);

    // Load pdf.js dynamically
    if (!window.pdfjsLib) {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        script.onload = () => { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; };
        document.head.appendChild(script);
    }

    const resultDiv = document.createElement('div'); resultDiv.style.display = 'none';
    const uploadWrap = makeUpload(ws, '.pdf', false, async (files) => {
        if (!window.pdfjsLib) { alert('PDF.js still loading, try again in a moment.'); return; }
        resultDiv.style.display = ''; resultDiv.innerHTML = '';
        const loadingBox = document.createElement('div'); loadingBox.className = 'result-box';
        const lt = document.createElement('div'); lt.className = 'r-title'; lt.textContent = 'Rendering pages...';
        const pb = document.createElement('div'); pb.className = 'progress-bar';
        const pf = document.createElement('div'); pf.className = 'progress-fill'; pf.style.width = '0%';
        pb.appendChild(pf); loadingBox.append(lt, pb); resultDiv.appendChild(loadingBox);

        try {
            const bytes = await files[0].arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
            const total = pdf.numPages;
            resultDiv.innerHTML = '';
            const title = document.createElement('div'); title.className = 'r-title'; title.style.textAlign = 'center'; title.style.marginBottom = '16px';
            title.textContent = total + ' pages extracted';
            resultDiv.appendChild(title);

            for (let i = 1; i <= total; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2 });
                const c = document.createElement('canvas'); c.width = viewport.width; c.height = viewport.height;
                await page.render({ canvasContext: c.getContext('2d'), viewport }).promise;

                const pageDiv = document.createElement('div'); pageDiv.className = 'file-item'; pageDiv.style.flexWrap = 'wrap';
                const thumb = document.createElement('img'); thumb.src = c.toDataURL('image/png'); thumb.style.cssText = 'width:60px;height:auto;border-radius:4px;border:1px solid var(--bdr);';
                const info = document.createElement('div'); info.className = 'fi-info';
                const nm = document.createElement('div'); nm.className = 'fi-name'; nm.textContent = 'Page ' + i + ' of ' + total;
                const mt = document.createElement('div'); mt.className = 'fi-meta'; mt.textContent = viewport.width + ' \u00d7 ' + viewport.height + 'px';
                info.append(nm, mt);
                const dl = document.createElement('button'); dl.className = 'btn btn-outline'; dl.style.padding = '6px 12px'; dl.style.fontSize = '11px'; dl.textContent = 'Download PNG';
                const dataUrl = c.toDataURL('image/png');
                dl.addEventListener('click', () => { const a = document.createElement('a'); a.download = 'page-' + i + '.png'; a.href = dataUrl; a.click(); });
                pageDiv.append(thumb, info, dl);
                resultDiv.appendChild(pageDiv);
            }
        } catch (err) {
            resultDiv.innerHTML = '';
            const box = document.createElement('div'); box.className = 'result-box'; box.style.borderColor = 'rgba(239,68,68,.3)';
            const ri = document.createElement('div'); ri.className = 'r-icon'; ri.textContent = '\u274c';
            const rt = document.createElement('div'); rt.className = 'r-title'; rt.style.color = 'var(--red)'; rt.textContent = err.message;
            box.append(ri, rt); resultDiv.appendChild(box);
        }
    });
    ws.appendChild(resultDiv);
}
